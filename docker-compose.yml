services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis
      - postgres
    volumes:
      - ./data:/app/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: juridico
      POSTGRES_PASSWORD: juridico_dev
      POSTGRES_DB: juridico
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
