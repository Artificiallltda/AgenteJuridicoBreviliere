name: Deploy to Railway

on:
  push:
    branches: [main]

jobs:
  test:
    name: Run Tests Before Deploy
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: fake-test-key-for-ci
      WHATSAPP_VERIFY_TOKEN: test-token
      TELEGRAM_BOT_TOKEN: test-token
      DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test
      CHROMA_PERSIST_DIR: /tmp/test_chroma
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt
      - run: pytest tests/unit/ -v --tb=short

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: test  # Só faz deploy se os testes passarem

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --detach

      - name: Notify deploy success
        if: success()
        run: echo "✅ Deploy Breviliere concluído com sucesso!"

      - name: Notify deploy failure
        if: failure()
        run: echo "❌ Deploy falhou. Verifique os logs acima."
